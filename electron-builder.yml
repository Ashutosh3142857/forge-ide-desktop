appId: run.forge.ide
productName: "Forge IDE"
copyright: "Copyright © 2026 Forge IDE"

directories:
  output: dist
  buildResources: assets

files:
  - main.js
  - preload.js
  - renderer/**/*
  - assets/**/*

# Auto-update support (optional - needs update server)
# publish:
#   provider: github
#   owner: forge-ide
#   repo: forge-ide

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: assets/icon.ico
  requestedExecutionLevel: asInvoker

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "Forge IDE"
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  installerHeaderIcon: assets/icon.ico
  deleteAppDataOnUninstall: false

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: assets/icon.icns
  category: public.app-category.developer-tools
  darkModeSupport: true
  hardenedRuntime: false
  gatekeeperAssess: false

dmg:
  title: "Forge IDE ${version}"
  background: assets/dmg-bg.png
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  icon: assets/icon.png
  category: Development
  synopsis: "Cloud Development Environment"
  description: "Forge IDE — A full-featured cloud IDE built better than Replit. Powered by Autonomy AI."
  desktop:
    Name: Forge IDE
    Comment: Cloud Development Environment
    Categories: Development;IDE;
    StartupWMClass: forge-ide

deb:
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0
    - libdrm2
    - libgbm1
    - libxcb-dri3-0
